<!DOCTYPE html>
<html>
<head>
    <title>Grades Records</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<h2 id="records-title">Grades Records</h2>

<div id="grades-records-list"><p>Loading...</p></div>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js?v=2"></script>
<script src="script.js?v=2"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cls    = getSelectedClass();
        const stream = getSelectedStream() || null;
        const list   = document.getElementById('grades-records-list');

        if (!cls) { goTo('teacher-dashboard.html'); return; }

        const label = stream ? cls + ' — ' + stream : cls;
        document.getElementById('records-title').textContent = 'Grades Records — ' + label;

        db.collection('grades')
            .where('class', '==', cls)
            .where('stream', '==', stream)
            .orderBy('date', 'desc')
            .get()
            .then(function(snapshot) {
                if (snapshot.empty) {
                    list.innerHTML = '<p>No records found.</p>';
                    return;
                }
                list.innerHTML = '';
                snapshot.forEach(function(doc) {
                    const record = doc.data();
                    const div = document.createElement('div');
                    div.style.marginBottom = '16px';
                    let html = '<h3>' + record.date + (record.subject ? ' — ' + record.subject : '') + '</h3>';
                    const grds = record.grades || {};
                    for (const student in grds) {
                        html += '<p>' + student + ': <strong>' + grds[student] + '</strong></p>';
                    }
                    div.innerHTML = html;
                    list.appendChild(div);
                });
            })
            .catch(function(err) {
                list.innerHTML = '<p style="color:red;">Error loading records: ' + err.message + '</p>';
            });
    });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
