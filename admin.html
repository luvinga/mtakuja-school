<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .section-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #ddd;
        }
        .section-card h3 {
            margin-top: 0;
            color: #333;
        }
        .admin-form label {
            display: block;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 4px;
            color: #444;
        }
        .admin-form input[type="text"],
        .admin-form input[type="tel"],
        .admin-form input[type="password"],
        .admin-form select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }
        .admin-form .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 4px;
        }
        .admin-form .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 0;
        }
        .admin-form button[type="submit"] {
            margin-top: 14px;
            background: #4CAF50;
            width: 100%;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item .item-info { flex: 1; }
        .list-item .item-info strong { display: block; }
        .list-item .item-info small { color: #888; }
        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            min-width: 70px;
        }
        .reset-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            min-width: 70px;
            margin-right: 6px;
        }
        .reset-btn:hover { background: #e65100; }
        .btn-group { display: flex; gap: 6px; }
        .status-msg { margin-top: 8px; font-size: 13px; }
        .status-msg.ok  { color: green; }
        .status-msg.err { color: red; }
        .group-header {
            font-weight: bold;
            color: #555;
            margin: 12px 0 4px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 160px;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #c8e6c9;
            font-size: 14px;
            background: #f9fbe7;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: #43a047; }
        .search-bar select {
            padding: 8px 10px;
            border-radius: 10px;
            border: 2px solid #c8e6c9;
            font-size: 14px;
            background: #f9fbe7;
        }
        .search-count {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goTo('teacher-dashboard.html')">← Back</button>
<h2 style="text-align:center;">⚙️ Admin Panel</h2>

<!-- ── MANAGE TEACHERS ─────────────────────────────────── -->
<div class="section-card">
    <h3>Manage Teachers</h3>

    <!-- Add Teacher Form -->
    <form id="add-teacher-form" class="admin-form" onsubmit="addTeacher(event)">
        <label>Name</label>
        <input type="text" id="t-name" placeholder="Full name" required>

        <label>Phone</label>
        <input type="tel" id="t-phone" placeholder="e.g. 0700000099" required>

        <label>Password</label>
        <input type="password" id="t-password" placeholder="Password" required>

        <label>Subject</label>
        <input type="text" id="t-subject" placeholder="e.g. Mathematics (leave blank for admin)">

        <label>Forms taught</label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="t-forms" value="Form 1"> Form 1</label>
            <label><input type="checkbox" name="t-forms" value="Form 2"> Form 2</label>
            <label><input type="checkbox" name="t-forms" value="Form 3"> Form 3</label>
            <label><input type="checkbox" name="t-forms" value="Form 4"> Form 4</label>
        </div>

        <label>Class Teacher Assignment (optional)</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <select id="t-ct-form" style="flex:1; padding:8px; border-radius:8px; border:1px solid #ccc;">
                <option value="">— No assignment —</option>
                <option value="Form 1">Form 1</option>
                <option value="Form 2">Form 2</option>
                <option value="Form 3">Form 3</option>
                <option value="Form 4">Form 4</option>
            </select>
            <select id="t-ct-stream" style="flex:1; padding:8px; border-radius:8px; border:1px solid #ccc;">
                <option value="">— No stream —</option>
                <option value="Science">Science</option>
                <option value="Business">Business</option>
                <option value="Arts">Arts</option>
            </select>
        </div>

        <label>Role</label>
        <select id="t-role">
            <option value="teacher">Teacher</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">Add Teacher</button>
        <div id="add-teacher-status" class="status-msg"></div>
    </form>

    <!-- Teachers List -->
    <h4 style="margin-top:20px;">All Teachers</h4>
    <div class="search-bar">
        <input type="text" id="teacher-search" placeholder="🔍 Search by name or subject..." oninput="filterTeachers()">
    </div>
    <div class="search-count" id="teacher-count"></div>
    <div id="teachers-list"><em style="color:#999;">Loading...</em></div>
</div>

<!-- ── MANAGE STUDENTS ─────────────────────────────────── -->
<div class="section-card">
    <h3>Manage Students</h3>

    <!-- Add Student Form -->
    <form id="add-student-form" class="admin-form" onsubmit="addStudent(event)">
        <label>Name</label>
        <input type="text" id="s-name" placeholder="Full name" required>

        <label>Form</label>
        <select id="s-form" onchange="toggleStreamField()" required>
            <option value="">Select form</option>
            <option value="Form 1">Form 1</option>
            <option value="Form 2">Form 2</option>
            <option value="Form 3">Form 3</option>
            <option value="Form 4">Form 4</option>
        </select>

        <div id="stream-field" style="display:none;">
            <label>Stream</label>
            <select id="s-stream">
                <option value="">Select stream</option>
                <option value="Science">Science</option>
                <option value="Business">Business</option>
                <option value="Arts">Arts</option>
            </select>
        </div>

        <label>Parent Phone <small style="font-weight:normal;color:#888;">(optional — can be assigned later)</small></label>
        <input type="tel" id="s-parent-phone" placeholder="e.g. 0714300399">

        <button type="submit">Add Student</button>
        <div id="add-student-status" class="status-msg"></div>
    </form>

    <!-- Students List -->
    <h4 style="margin-top:20px;">All Students</h4>
    <div class="search-bar">
        <input type="text" id="student-search" placeholder="🔍 Search by name..." oninput="filterStudents()">
        <select id="student-filter-form" onchange="filterStudents()">
            <option value="">All Forms</option>
            <option value="Form 1">Form 1</option>
            <option value="Form 2">Form 2</option>
            <option value="Form 3">Form 3</option>
            <option value="Form 4">Form 4</option>
        </select>
        <select id="student-filter-stream" onchange="filterStudents()">
            <option value="">All Streams</option>
            <option value="Science">Science</option>
            <option value="Business">Business</option>
            <option value="Arts">Arts</option>
        </select>
    </div>
    <div class="search-count" id="student-count"></div>
    <div id="students-list"><em style="color:#999;">Loading...</em></div>
</div>

<button onclick="logout()" style="background:#f44336; width:100%; margin-top:10px;">Logout</button>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="script.js?v=2"></script>
<script>
    // ── Auth Guard ──────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
        const role = checkAuth();
        if (role !== 'admin') {
            alert('Access denied. Admin only.');
            goTo('teacher-dashboard.html');
            return;
        }
        loadTeachersList();
        loadStudentsList();
    });

    // ── Stream field toggle ─────────────────────────────────────────────────────
    function toggleStreamField() {
        const form = document.getElementById('s-form').value;
        const streamField = document.getElementById('stream-field');
        streamField.style.display = (form === 'Form 3' || form === 'Form 4') ? 'block' : 'none';
        if (form !== 'Form 3' && form !== 'Form 4') {
            document.getElementById('s-stream').value = '';
        }
    }

    // ── Add Teacher ─────────────────────────────────────────────────────────────
    function addTeacher(e) {
        e.preventDefault();
        const statusEl = document.getElementById('add-teacher-status');
        statusEl.textContent = '';

        const phone = document.getElementById('t-phone').value.trim();
        if (!phone) { statusEl.textContent = 'Phone is required.'; statusEl.className = 'status-msg err'; return; }

        const forms = Array.from(document.querySelectorAll('input[name="t-forms"]:checked')).map(cb => cb.value);
        const ctForm   = document.getElementById('t-ct-form').value || null;
        const ctStream = document.getElementById('t-ct-stream').value || null;
        const classTeacher = ctForm ? { form: ctForm, stream: ctStream } : null;

        const doc = {
            name:            document.getElementById('t-name').value.trim(),
            phone:           phone,
            password:        document.getElementById('t-password').value,
            role:            document.getElementById('t-role').value,
            subject:         document.getElementById('t-subject').value.trim() || null,
            forms:           forms,
            classTeacher:    classTeacher,
            passwordChanged: false
        };

        statusEl.textContent = 'Saving...';
        statusEl.className = 'status-msg';

        db.collection('teachers').doc(phone).set(doc)
            .then(function() {
                statusEl.textContent = 'Teacher added successfully!';
                statusEl.className = 'status-msg ok';
                document.getElementById('add-teacher-form').reset();
                loadTeachersList();
            })
            .catch(function(err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status-msg err';
            });
    }

    // ── Add Student ─────────────────────────────────────────────────────────────
    function addStudent(e) {
        e.preventDefault();
        const statusEl = document.getElementById('add-student-status');
        statusEl.textContent = '';

        const form   = document.getElementById('s-form').value;
        const stream = document.getElementById('s-stream').value || null;
        const parentPhone = document.getElementById('s-parent-phone').value.trim();

        if (!form) { statusEl.textContent = 'Please select a form.'; statusEl.className = 'status-msg err'; return; }
        if ((form === 'Form 3' || form === 'Form 4') && !stream) {
            statusEl.textContent = 'Please select a stream for Form 3/4.';
            statusEl.className = 'status-msg err';
            return;
        }
        const doc = {
            name:            document.getElementById('s-name').value.trim(),
            form:            form,
            stream:          stream,
            parentPhone:     parentPhone || null,
            parentPassword:  parentPhone ? 'parent123' : null,
            passwordChanged: false
        };

        statusEl.textContent = 'Saving...';
        statusEl.className = 'status-msg';

        db.collection('students').add(doc)
            .then(function() {
                statusEl.textContent = 'Student added successfully!';
                statusEl.className = 'status-msg ok';
                document.getElementById('add-student-form').reset();
                document.getElementById('stream-field').style.display = 'none';
                loadStudentsList();
            })
            .catch(function(err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status-msg err';
            });
    }

    // ── In-memory cache for filtering ──────────────────────────────────────────
    var allTeacherDocs = [];
    var allStudentDocs = [];

    // ── Load & Render Teachers ──────────────────────────────────────────────────
    function loadTeachersList() {
        const container = document.getElementById('teachers-list');
        container.innerHTML = '<em style="color:#999;">Loading...</em>';
        db.collection('teachers').orderBy('name').get()
            .then(function(snapshot) {
                allTeacherDocs = [];
                snapshot.forEach(function(docSnap) { allTeacherDocs.push(docSnap); });
                filterTeachers();
            })
            .catch(function(err) {
                container.innerHTML = '<em style="color:red;">Error: ' + err.message + '</em>';
            });
    }

    function filterTeachers() {
        const query = (document.getElementById('teacher-search').value || '').toLowerCase().trim();
        const container = document.getElementById('teachers-list');
        container.innerHTML = '';

        if (allTeacherDocs.length === 0) {
            container.innerHTML = '<em style="color:#999;">No teachers found.</em>';
            document.getElementById('teacher-count').textContent = '';
            return;
        }

        const filtered = allTeacherDocs.filter(function(docSnap) {
            const t = docSnap.data();
            if (!query) return true;
            return (t.name || '').toLowerCase().includes(query) ||
                   (t.subject || '').toLowerCase().includes(query) ||
                   (t.phone || '').includes(query);
        });

        document.getElementById('teacher-count').textContent =
            filtered.length + ' of ' + allTeacherDocs.length + ' teachers';

        if (filtered.length === 0) {
            container.innerHTML = '<em style="color:#999;">No teachers match your search.</em>';
            return;
        }

        filtered.forEach(function(docSnap) {
            const t = docSnap.data();
            const item = document.createElement('div');
            item.className = 'list-item';

            const info = document.createElement('div');
            info.className = 'item-info';
            const strong = document.createElement('strong');
            strong.textContent = t.name + (t.role === 'admin' ? ' (Admin)' : '');
            const small = document.createElement('small');
            small.textContent = t.phone + (t.subject ? ' — ' + t.subject : '') +
                (t.classTeacher ? ' | Class: ' + t.classTeacher.form + (t.classTeacher.stream ? ' ' + t.classTeacher.stream : '') : '');
            info.appendChild(strong);
            info.appendChild(small);

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            const resetBtn = document.createElement('button');
            resetBtn.className = 'reset-btn';
            resetBtn.textContent = 'Reset Password';
            resetBtn.onclick = function() { resetTeacherPassword(t.phone, t.name); };

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = 'Delete';
            delBtn.onclick = function() { deleteTeacher(t.phone, t.name); };

            btnGroup.appendChild(resetBtn);
            btnGroup.appendChild(delBtn);
            item.appendChild(info);
            item.appendChild(btnGroup);
            container.appendChild(item);
        });
    }

    // ── Load & Render Students ──────────────────────────────────────────────────
    function loadStudentsList() {
        const container = document.getElementById('students-list');
        container.innerHTML = '<em style="color:#999;">Loading...</em>';
        db.collection('students').orderBy('form').get()
            .then(function(snapshot) {
                allStudentDocs = [];
                snapshot.forEach(function(docSnap) { allStudentDocs.push(docSnap); });
                filterStudents();
            })
            .catch(function(err) {
                container.innerHTML = '<em style="color:red;">Error: ' + err.message + '</em>';
            });
    }

    function filterStudents() {
        const query      = (document.getElementById('student-search').value || '').toLowerCase().trim();
        const formFilter = document.getElementById('student-filter-form').value;
        const streamFilter = document.getElementById('student-filter-stream').value;
        const container = document.getElementById('students-list');
        container.innerHTML = '';

        if (allStudentDocs.length === 0) {
            container.innerHTML = '<em style="color:#999;">No students found.</em>';
            document.getElementById('student-count').textContent = '';
            return;
        }

        const filtered = allStudentDocs.filter(function(docSnap) {
            const s = docSnap.data();
            if (formFilter && s.form !== formFilter) return false;
            if (streamFilter && s.stream !== streamFilter) return false;
            if (query && !(s.name || '').toLowerCase().includes(query)) return false;
            return true;
        });

        document.getElementById('student-count').textContent =
            filtered.length + ' of ' + allStudentDocs.length + ' students';

        if (filtered.length === 0) {
            container.innerHTML = '<em style="color:#999;">No students match your search.</em>';
            return;
        }

        // Group by form + stream
        const groups = {};
        filtered.forEach(function(docSnap) {
            const data = docSnap.data();
            const groupKey = data.form + (data.stream ? ' — ' + data.stream : '');
            if (!groups[groupKey]) groups[groupKey] = [];
            groups[groupKey].push(docSnap);
        });

        Object.keys(groups).sort().forEach(function(groupKey) {
            const header = document.createElement('div');
            header.className = 'group-header';
            header.textContent = groupKey;
            container.appendChild(header);

            groups[groupKey].sort(function(a, b) { return a.data().name.localeCompare(b.data().name); });
            groups[groupKey].forEach(function(docSnap) {
                const s = docSnap.data();
                const docId = docSnap.id || s.parentPhone;
                const item = document.createElement('div');
                item.className = 'list-item';

                const info = document.createElement('div');
                info.className = 'item-info';
                const strong = document.createElement('strong');
                strong.textContent = s.name;
                const small = document.createElement('small');
                small.textContent = s.parentPhone ? 'Parent: ' + s.parentPhone : '⚠️ No parent assigned';
                small.style.color = s.parentPhone ? '#888' : '#e65100';
                info.appendChild(strong);
                info.appendChild(small);

                const sBtnGroup = document.createElement('div');
                sBtnGroup.className = 'btn-group';

                if (!s.parentPhone) {
                    const assignBtn = document.createElement('button');
                    assignBtn.className = 'reset-btn';
                    assignBtn.textContent = 'Set Parent';
                    assignBtn.style.background = '#2196F3';
                    assignBtn.onclick = function() { assignParent(docId, s.name); };
                    sBtnGroup.appendChild(assignBtn);
                } else {
                    const sResetBtn = document.createElement('button');
                    sResetBtn.className = 'reset-btn';
                    sResetBtn.textContent = 'Reset';
                    sResetBtn.onclick = function() { resetStudentPassword(docId, s.name); };
                    sBtnGroup.appendChild(sResetBtn);
                }

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = 'Delete';
                delBtn.onclick = function() { deleteStudent(docId, s.name); };

                sBtnGroup.appendChild(delBtn);
                item.appendChild(info);
                item.appendChild(sBtnGroup);
                container.appendChild(item);
            });
        });
    }

    // ── Delete Teacher ──────────────────────────────────────────────────────────
    function deleteTeacher(phone, name) {
        if (!confirm('Delete teacher "' + name + '"? This cannot be undone.')) return;
        db.collection('teachers').doc(phone).delete()
            .then(function() { loadTeachersList(); })
            .catch(function(err) { alert('Error deleting teacher: ' + err.message); });
    }

    // ── Delete Student ──────────────────────────────────────────────────────────
    function deleteStudent(docId, name) {
        if (!confirm('Delete student "' + name + '"? This cannot be undone.')) return;
        db.collection('students').doc(docId).delete()
            .then(function() { loadStudentsList(); })
            .catch(function(err) { alert('Error deleting student: ' + err.message); });
    }

    // ── Assign Parent Phone ─────────────────────────────────────────────────────
    function assignParent(docId, studentName) {
        const phone = prompt('Enter parent phone number for ' + studentName + ':');
        if (!phone || !phone.trim()) return;
        const trimmedPhone = phone.trim();
        db.collection('students').doc(docId).update({
            parentPhone:     trimmedPhone,
            parentPassword:  'parent123',
            passwordChanged: false
        }).then(function() {
            alert('Parent assigned! Default password is "parent123". They will be asked to change it on first login.');
            loadStudentsList();
        }).catch(function(err) { alert('Error: ' + err.message); });
    }

    // ── Reset Teacher Password ──────────────────────────────────────────────────
    function resetTeacherPassword(phone, name) {
        if (!confirm('Reset password for "' + name + '"? They will be asked to set a new password on next login.')) return;
        db.collection('teachers').doc(phone).update({ passwordChanged: false })
            .then(function() {
                alert('Password reset. User will be asked to set a new password on next login.');
            })
            .catch(function(err) { alert('Error resetting password: ' + err.message); });
    }

    // ── Reset Student (Parent) Password ────────────────────────────────────────
    function resetStudentPassword(docId, name) {
        if (!confirm('Reset password for parent of "' + name + '"? They will be asked to set a new password on next login.')) return;
        db.collection('students').doc(docId).update({ passwordChanged: false })
            .then(function() {
                alert('Password reset. User will be asked to set a new password on next login.');
            })
            .catch(function(err) { alert('Error resetting password: ' + err.message); });
    }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
