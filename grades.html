<!DOCTYPE html>
<html>
<head>
    <title>Enter Grades</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .selector-row {
            margin-bottom: 10px;
        }
        .selector-row label {
            display: block;
            margin-bottom: 4px;
        }
        .selector-row select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .grade-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .grade-input {
            width: 70px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            text-align: center;
        }
        .grade-input:focus {
            outline: none;
            border-color: #43a047;
        }
        .grade-input:read-only {
            background: #f1f8e9;
            border-color: #a5d6a7;
            color: #2e7d32;
            cursor: default;
        }
        .grade-badge {
            font-weight: bold;
            font-size: 15px;
            min-width: 28px;
            text-align: center;
        }
        .grade-A { color: #1b5e20; }
        .grade-B { color: #2e7d32; }
        .grade-C { color: #f57c00; }
        .grade-D { color: #e65100; }
        .grade-F { color: #c62828; }
        .saved-indicator {
            font-size: 11px;
            color: #2e7d32;
            white-space: nowrap;
        }
        .edit-grade-btn {
            font-size: 11px;
            padding: 3px 8px;
            background: #1976D2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }
        .edit-grade-btn:hover { background: #1565C0; }
        #load-status {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin: 4px 0 8px;
        }
    </style>
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<h2 id="grades-title" data-i18n="grades_title">Enter Grades</h2>

<div class="selector-row">
    <label for="exam-type-select" data-i18n="select_exam">Select Exam:</label>
    <select id="exam-type-select" onchange="updateTitle()">
        <option value="Mid Term 1">Mid Term 1</option>
        <option value="Terminal 1">Terminal 1</option>
        <option value="Mid Term 2">Mid Term 2</option>
        <option value="Terminal 2">Terminal 2</option>
    </select>
</div>

<div class="selector-row">
    <label for="subject-select" id="subject-label">Select Subject:</label>
    <select id="subject-select" onchange="renderStudentList()"></select>
</div>

<p id="loading-msg" style="text-align:center; color:#666;">Loading students...</p>
<p id="load-status"></p>
<div id="grades-list"></div>

<br>
<button id="save-btn" onclick="saveGrades()" style="display:none;" data-i18n="save_grades">Save Grades</button>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=9"></script>
<script>
    var loadedStudents = [];
    var classLabel = '';
    var existingDocId = null;   // Firestore doc id if grades already saved
    var existingGrades = {};    // { studentName: marks }

    function updateTitle() {
        const examType = document.getElementById('exam-type-select').value;
        document.getElementById('grades-title').textContent = 'Grades — ' + classLabel + ' (' + examType + ')';
    }

    document.addEventListener('DOMContentLoaded', function() {
        const cls = getSelectedClass();
        if (!cls) { goTo('teacher-dashboard.html'); return; }
        const stream = getSelectedStream();
        classLabel = stream ? cls + ' ' + stream : cls;
        updateTitle();

        let teacher = null;
        try { teacher = JSON.parse(localStorage.getItem('teacherData')); } catch(e) {}

        const select = document.getElementById('subject-select');
        const subjectLabel = document.getElementById('subject-label');

        if (teacher && teacher.role !== 'admin' && teacher.subject) {
            const opt = document.createElement('option');
            opt.value = teacher.subject;
            opt.textContent = teacher.subject;
            select.appendChild(opt);
            select.disabled = true;
            subjectLabel.textContent = 'Subject:';
        } else {
            const subjects = getCurrentSubjects();
            subjects.forEach(function(subject) {
                const opt = document.createElement('option');
                opt.value = subject;
                opt.textContent = subject;
                select.appendChild(opt);
            });
        }

        // Load students first, then load existing grades
        loadStudentsForClass(cls, stream || null)
            .then(function(students) {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('save-btn').style.display = 'block';

                if (students.length === 0) {
                    document.getElementById('loading-msg').textContent = 'No students found for this class.';
                    document.getElementById('loading-msg').style.display = 'block';
                    return;
                }

                students.sort(function(a, b) { return a.name.localeCompare(b.name); });
                loadedStudents = students;
                loadExistingGrades();
            })
            .catch(function(err) {
                document.getElementById('loading-msg').textContent = 'Error loading students: ' + err.message;
            });

        // Reload existing grades whenever subject or exam changes
        document.getElementById('subject-select').addEventListener('change', loadExistingGrades);
        document.getElementById('exam-type-select').addEventListener('change', function() {
            updateTitle();
            loadExistingGrades();
        });
    });

    function loadExistingGrades() {
        if (loadedStudents.length === 0) return;
        const cls    = getSelectedClass();
        const stream = getSelectedStream() || null;
        const subject  = document.getElementById('subject-select').value;
        const examType = document.getElementById('exam-type-select').value;
        const statusEl = document.getElementById('load-status');

        if (!subject) { renderStudentList({}); return; }

        statusEl.textContent = 'Checking existing grades...';
        existingDocId  = null;
        existingGrades = {};

        db.collection('grades')
            .where('class',    '==', cls)
            .where('stream',   '==', stream)
            .where('subject',  '==', subject)
            .where('examType', '==', examType)
            .get()
            .then(function(snap) {
                if (!snap.empty) {
                    // Last saved record wins
                    var sorted = snap.docs.slice().sort(function(a, b) {
                        return (a.data().date || '') < (b.data().date || '') ? 1 : -1;
                    });
                    existingDocId  = sorted[0].id;
                    existingGrades = sorted[0].data().grades || {};
                    var count = Object.keys(existingGrades).filter(function(k) {
                        return existingGrades[k] !== '' && existingGrades[k] !== null && existingGrades[k] !== undefined;
                    }).length;
                    statusEl.innerHTML = '✅ <strong>' + count + ' grade(s)</strong> already saved for this exam. Locked fields can be unlocked with the Edit button.';
                    statusEl.style.color = '#2e7d32';
                } else {
                    statusEl.textContent = 'No grades saved yet for this exam.';
                    statusEl.style.color = '#888';
                }
                renderStudentList(existingGrades);
            })
            .catch(function(err) {
                statusEl.textContent = 'Error checking grades: ' + err.message;
                renderStudentList({});
            });
    }

    function renderStudentList(savedGrades) {
        const list = document.getElementById('grades-list');
        list.innerHTML = '';

        loadedStudents.forEach(function(student) {
            const div = document.createElement('div');
            div.className = 'student-row';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'student-name';
            nameSpan.textContent = student.name;

            const gradeCell = document.createElement('div');
            gradeCell.className = 'grade-cell';

            const existingVal = savedGrades[student.name];
            const hasExisting = existingVal !== undefined && existingVal !== null && existingVal !== '';

            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'grade-input';
            input.min = '0';
            input.max = '100';
            input.placeholder = '0–100';

            const badge = document.createElement('span');
            badge.className = 'grade-badge';

            if (hasExisting) {
                input.value = existingVal;
                input.readOnly = true;
                var g = marksToGrade(parseFloat(existingVal));
                badge.textContent = g;
                badge.className = 'grade-badge grade-' + g;
            } else {
                badge.textContent = '—';
                badge.className = 'grade-badge';
            }

            input.addEventListener('input', function() {
                var val = this.value.trim();
                if (val === '' || isNaN(val)) {
                    badge.textContent = '—';
                    badge.className = 'grade-badge';
                } else {
                    var g = marksToGrade(parseFloat(val));
                    badge.textContent = g;
                    badge.className = 'grade-badge grade-' + g;
                }
            });

            gradeCell.appendChild(input);
            gradeCell.appendChild(badge);

            // If already saved, show a small indicator + Edit button
            if (hasExisting) {
                const savedSpan = document.createElement('span');
                savedSpan.className = 'saved-indicator';
                savedSpan.textContent = '✔ saved';
                gradeCell.appendChild(savedSpan);

                const editBtn = document.createElement('button');
                editBtn.className = 'edit-grade-btn';
                editBtn.textContent = 'Edit';
                editBtn.onclick = function() {
                    input.readOnly = false;
                    input.focus();
                    input.select();
                    savedSpan.textContent = '✏️ editing';
                    savedSpan.style.color = '#e65100';
                    editBtn.style.display = 'none';
                };
                gradeCell.appendChild(editBtn);
            }

            div.appendChild(nameSpan);
            div.appendChild(gradeCell);
            list.appendChild(div);
        });
    }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
