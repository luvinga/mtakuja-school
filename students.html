<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .student-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f0f0;
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 8px;
            gap: 8px;
        }
        .student-item-photo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #a5d6a7;
            flex-shrink: 0;
        }
        .student-item-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #e8f5e9;
            border: 2px solid #c8e6c9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .student-item-name {
            flex: 1;
            font-size: 14px;
            cursor: pointer;
        }
        .results-btn {
            display: inline-block;
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            margin: 0;
            background: #1976D2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .results-btn:hover {
            background: #1565C0;
        }
    </style>
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<h2 id="students-title">Students List</h2>

<p id="loading-msg" style="text-align:center; color:#666;">Loading students...</p>
<div id="students-list"></div>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=8"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cls = getSelectedClass();
        if (!cls) { goTo('teacher-dashboard.html'); return; }
        const stream = getSelectedStream();
        const label = stream ? cls + ' (' + stream + ')' : cls;
        document.getElementById('students-title').textContent = 'Students — ' + label;

        // Only class teachers and admins can view individual student reports
        var teacher = null;
        try { teacher = JSON.parse(localStorage.getItem('teacherData')); } catch(e) {}
        var canViewReports = !teacher || teacher.role === 'admin' ||
            (teacher.classTeacher &&
             teacher.classTeacher.form === cls &&
             (teacher.classTeacher.stream || null) === (stream || null));

        loadStudentsForClass(cls, stream || null)
            .then(function(students) {
                document.getElementById('loading-msg').style.display = 'none';
                const list = document.getElementById('students-list');

                if (students.length === 0) {
                    document.getElementById('loading-msg').textContent = 'No students found.';
                    document.getElementById('loading-msg').style.display = 'block';
                    return;
                }

                students.sort(function(a, b) { return a.name.localeCompare(b.name); });
                students.forEach(function(student) {
                    const div = document.createElement('div');
                    div.className = 'student-item';

                    // Photo or avatar
                    if (student.photoUrl) {
                        var img = document.createElement('img');
                        img.className = 'student-item-photo';
                        img.src = student.photoUrl;
                        img.onerror = function() {
                            var av = document.createElement('div');
                            av.className = 'student-item-avatar';
                            av.textContent = '👤';
                            this.parentNode.replaceChild(av, this);
                        };
                        div.appendChild(img);
                    } else {
                        var av = document.createElement('div');
                        av.className = 'student-item-avatar';
                        av.textContent = '👤';
                        div.appendChild(av);
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'student-item-name';
                    nameSpan.textContent = student.name;
                    nameSpan.onclick = function() { viewProfile(student.name); };

                    div.appendChild(nameSpan);

                    if (canViewReports) {
                        const resultsBtn = document.createElement('button');
                        resultsBtn.className = 'results-btn';
                        resultsBtn.textContent = 'Results';
                        resultsBtn.onclick = function() {
                            localStorage.setItem('selectedStudent', student.name);
                            goTo('results.html');
                        };
                        div.appendChild(resultsBtn);
                    }

                    list.appendChild(div);
                });
            })
            .catch(function(err) {
                document.getElementById('loading-msg').textContent = 'Error loading students: ' + err.message;
            });
    });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
