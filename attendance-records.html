<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<h2 id="records-title">Attendance Records</h2>

<div id="records-list"><p>Loading...</p></div>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js?v=2"></script>
<script src="translations.js"></script>
<script src="script.js?v=8"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cls    = getSelectedClass();
        const stream = getSelectedStream() || null;
        const list   = document.getElementById('records-list');

        if (!cls) { goTo('teacher-dashboard.html'); return; }

        const label = stream ? cls + ' — ' + stream : cls;
        document.getElementById('records-title').textContent = 'Attendance Records — ' + label;

        db.collection('attendance')
            .where('class', '==', cls)
            .where('stream', '==', stream)
            .orderBy('date', 'desc')
            .get()
            .then(function(snapshot) {
                if (snapshot.empty) {
                    list.innerHTML = '<p>No records found.</p>';
                    return;
                }
                list.innerHTML = '';
                snapshot.forEach(function(doc) {
                    const record = doc.data();
                    const div = document.createElement('div');
                    div.style.marginBottom = '16px';
                    let html = '<h3>' + record.date + '</h3>';
                    const att = record.attendance || {};
                    for (const student in att) {
                        const status = att[student];
                        const color  = status === 'Present' ? '#4CAF50' : '#f44336';
                        html += '<p>' + student + ': <strong style="color:' + color + '">' + status + '</strong></p>';
                    }
                    div.innerHTML = html;
                    list.appendChild(div);
                });
            })
            .catch(function(err) {
                list.innerHTML = '<p style="color:red;">Error loading records: ' + err.message + '</p>';
            });
    });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
