<!DOCTYPE html>
<html>
<head>
    <title>Student Result Slip</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* ── Letterhead ── */
        .letterhead {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            gap: 8px;
        }
        .letterhead-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .letterhead-left img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4CAF50;
            flex-shrink: 0;
        }
        .letterhead-center {
            flex: 2;
            text-align: center;
        }
        .letterhead-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        .letterhead-right img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #43a047;
        }
        .letterhead-right .no-photo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #e8f5e9;
            border: 2px dashed #a5d6a7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .letterhead h2 {
            margin: 0 0 2px;
            font-size: 15px;
            color: #1b5e20;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .letterhead .school-address {
            font-size: 10px;
            color: #555;
            line-height: 1.6;
            margin: 0;
        }
        .slip-divider {
            border: none;
            border-top: 2px solid #4CAF50;
            margin: 8px 0 10px 0;
        }
        .slip-meta {
            font-size: 12px;
            color: #444;
            margin-bottom: 8px;
        }
        .slip-meta span {
            display: inline-block;
            margin-right: 14px;
        }
        /* ── Signature footer ── */
        .slip-footer {
            margin-top: 18px;
            border-top: 1px solid #ccc;
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 11px;
            color: #444;
        }
        .slip-footer .sig-block {
            text-align: center;
        }
        .slip-footer .sig-block img {
            height: 40px;
            display: block;
            margin: 0 auto 4px;
        }
        .slip-footer .sig-line {
            border-top: 1px solid #333;
            width: 140px;
            margin: 4px auto 2px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-bottom: 12px;
        }
        .result-table th {
            background: #4CAF50;
            color: white;
            padding: 5px 3px;
            text-align: center;
        }
        .result-table th:first-child {
            text-align: left;
            padding-left: 6px;
        }
        .result-table td {
            padding: 5px 3px;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
        }
        .result-table td:first-child {
            text-align: left;
            padding-left: 6px;
        }
        .result-table tr:nth-child(even) { background: #f9f9f9; }
        .no-grade { color: #bbb; }
        .final-grade-cell { font-weight: bold; }
        .summary-box {
            background: #f0f7f0;
            border: 1px solid #4CAF50;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .summary-box p { margin: 4px 0; }
        .division-label {
            font-size: 15px;
            font-weight: bold;
            color: #2e7d32;
        }
        .no-data-msg {
            color: #888;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
        .conduct-section { margin-top: 14px; }
        .conduct-section h3 { font-size: 13px; color: #2e7d32; margin-bottom: 6px; }
        .conduct-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-bottom: 8px;
        }
        .conduct-table th {
            background: #66BB6A;
            color: white;
            padding: 4px 3px;
            text-align: center;
        }
        .conduct-table th:first-child { text-align: left; padding-left: 6px; }
        .conduct-table td {
            padding: 4px 3px;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
        }
        .conduct-table td:first-child { text-align: left; padding-left: 6px; }
        .conduct-table tr:nth-child(even) { background: #f9f9f9; }
        .rating-5 { color: #2e7d32; font-weight: bold; }
        .rating-4 { color: #388e3c; }
        .rating-3 { color: #f57c00; }
        .rating-2 { color: #d32f2f; }
        .rating-1 { color: #b71c1c; font-weight: bold; }
        /* ── Print styles ── */
        @media print {
            .back-btn,
            .print-btn,
            #no-print { display: none !important; }
            body {
                background: white;
                display: block;
                height: auto;
            }
            .app-container {
                box-shadow: none;
                border-radius: 0;
                height: auto;
                width: 100%;
                max-width: 100%;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<!-- Letterhead -->
<div class="letterhead">
    <div class="letterhead-left">
        <img src="mtakuja.png" alt="School Logo">
    </div>
    <div class="letterhead-center">
        <h2>Mtakuja Beach Secondary School</h2>
        <p class="school-address">
            Kunduchi Beach, Kinondoni Municipality, Dar es Salaam, Tanzania<br>
            P.O. Box 66500, Dar es Salaam &nbsp;|&nbsp; Tel: +255 654 995 533
        </p>
    </div>
    <div class="letterhead-right" id="student-photo-slot">
        <div class="no-photo">👤</div>
    </div>
</div>
<hr class="slip-divider">

<div class="slip-meta">
    <span id="slip-student-name">Student: —</span>
    <span id="slip-class">Class: —</span>
    <span id="slip-year">Year: —</span>
</div>

<div id="result-content"><p style="text-align:center;color:#666;">Loading result...</p></div>

<div id="conduct-display"></div>

<div id="slip-footer" style="display:none;" class="slip-footer">
    <div class="sig-block">
        <img src="signature.png" alt="Signature" onerror="this.style.display='none'">
        <div class="sig-line"></div>
        <strong>Mr. Bernard Kazimoto</strong><br>Head of School
    </div>
    <div style="font-size:11px; color:#888; text-align:right;">
        Official School Result Slip<br>
        <span id="slip-date-issued"></span>
    </div>
</div>

<div id="action-btns">
    <button class="print-btn" onclick="window.print()" id="print-btn" style="display:none;">Print Result Slip</button>
</div>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=3"></script>
<script>
    const EXAM_TYPES = ['Mid Term 1', 'Terminal 1', 'Mid Term 2', 'Terminal 2'];
    const EXAM_SHORT = {
        'Mid Term 1': 'Mid T1',
        'Terminal 1': 'Term 1',
        'Mid Term 2': 'Mid T2',
        'Terminal 2': 'Term 2'
    };

    document.addEventListener('DOMContentLoaded', function() {
        // Determine context: parent view or teacher view
        const role = localStorage.getItem('role');
        let student, cls, stream;

        if (role === 'parent') {
            student = localStorage.getItem('student');
            cls     = localStorage.getItem('studentClass');
            stream  = localStorage.getItem('studentStream') || null;
        } else {
            // Teacher / admin view — student set via selectedStudent
            student = localStorage.getItem('selectedStudent');
            cls     = localStorage.getItem('selectedClass');
            stream  = localStorage.getItem('selectedStream') || null;
        }

        if (!student || !cls) {
            document.getElementById('result-content').innerHTML =
                '<p style="color:red;text-align:center;">No student selected. Please go back and select a student.</p>';
            return;
        }

        const classLabel = stream ? cls + ' — ' + stream : cls;
        const currentYear = new Date().getFullYear();

        document.getElementById('slip-student-name').textContent = 'Student: ' + student;
        document.getElementById('slip-class').textContent = 'Class: ' + classLabel;
        document.getElementById('slip-year').textContent = 'Year: ' + currentYear;
        document.getElementById('slip-date-issued').textContent =
            'Issued: ' + new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

        // Load student photo
        db.collection('students').where('name', '==', student).get()
            .then(function(snap) {
                var photoDiv = document.getElementById('student-photo-slot');
                if (!snap.empty && snap.docs[0].data().photoUrl) {
                    photoDiv.innerHTML = '<img src="' + snap.docs[0].data().photoUrl + '" onerror="this.parentNode.innerHTML=\'<div class=no-photo>👤</div>\'">';
                }
            }).catch(function(){});

        // Get subjects for this class/stream
        let subjects = [];
        if (stream) {
            subjects = streamSubjects[stream] || [];
        } else {
            subjects = classSubjects[cls] || [];
        }

        if (subjects.length === 0) {
            document.getElementById('result-content').innerHTML =
                '<p class="no-data-msg">No subjects found for this class.</p>';
            return;
        }

        // Load teachers and grades in parallel
        Promise.all([
            db.collection('teachers').get(),
            db.collection('grades').where('class', '==', cls).where('stream', '==', stream).get()
        ]).then(function(results) {
                var teacherSnap = results[0];
                var gradeSnap   = results[1];

                // Build subject → teacher map for this form
                var subjectTeacher = {};
                teacherSnap.forEach(function(doc) {
                    var t = doc.data();
                    if (!t.subject || !t.forms) return;
                    if (t.forms.includes(cls)) {
                        if (!subjectTeacher[t.subject]) {
                            subjectTeacher[t.subject] = { name: t.name, phone: t.phone };
                        }
                    }
                });

                // Build: subjectGrades[subject][examType] = latest grade string
                var subjectGrades = {};
                subjects.forEach(function(s) { subjectGrades[s] = {}; });

                var docs = gradeSnap.docs.slice().sort(function(a, b) {
                    var da = a.data().date || '';
                    var db2 = b.data().date || '';
                    return da < db2 ? -1 : da > db2 ? 1 : 0;
                });

                docs.forEach(function(doc) {
                    var record = doc.data();
                    if (!record.subject || !record.grades || record.grades[student] === undefined) return;
                    var examType = record.examType || '';
                    if (!examType) return;
                    if (!subjectGrades[record.subject]) subjectGrades[record.subject] = {};
                    subjectGrades[record.subject][examType] = record.grades[student];
                });

                // Compute final grades
                var finalPoints = [];
                var tableRows = [];

                subjects.forEach(function(subject) {
                    var examGrades = subjectGrades[subject] || {};
                    var pointsList = [];
                    EXAM_TYPES.forEach(function(et) {
                        var g = examGrades[et];
                        if (g !== undefined && g !== null && g !== '') pointsList.push(gradeToPoints(g));
                    });

                    var finalGrade = '';
                    var finalPts = '';
                    if (pointsList.length > 0) {
                        var avg = pointsList.reduce(function(s, p) { return s + p; }, 0) / pointsList.length;
                        finalGrade = pointsToGrade(avg);
                        finalPts = gradeToPoints(finalGrade);
                        finalPoints.push(finalPts);
                    }

                    tableRows.push({
                        subject: subject,
                        examGrades: examGrades,
                        finalGrade: finalGrade,
                        finalPts: finalPts,
                        teacher: subjectTeacher[subject] || null
                    });
                });

                // Helper: render two cells (Marks | Grade) for a numeric/letter value
                function examCells(g, cellClass) {
                    cellClass = cellClass || 'final-grade-cell';
                    if (g === undefined || g === null || g === '') {
                        return '<td><span class="no-grade">—</span></td><td><span class="no-grade">—</span></td>';
                    }
                    var isNum = typeof g === 'number' || (typeof g === 'string' && !isNaN(g) && g !== '');
                    var marks = isNum ? parseFloat(g) : null;
                    var letter = isNum ? marksToGrade(marks) : String(g).toUpperCase();
                    var marksCell = isNum ? '<td style="font-weight:bold;">' + marks + '</td>' : '<td><span class="no-grade">—</span></td>';
                    return marksCell + '<td class="' + cellClass + '">' + letter + '</td>';
                }

                // Helper: compute term average marks given two exam keys
                function termAvg(examGrades, key1, key2) {
                    var vals = [examGrades[key1], examGrades[key2]].filter(function(v) {
                        return v !== undefined && v !== null && v !== '' &&
                               (typeof v === 'number' || (typeof v === 'string' && !isNaN(v) && v !== ''));
                    }).map(function(v) { return parseFloat(v); });
                    if (vals.length === 0) return null;
                    return Math.round((vals.reduce(function(s, v) { return s + v; }, 0) / vals.length) * 10) / 10;
                }

                // Build HTML — two-row header
                var html = '<table class="result-table"><thead><tr>';
                html += '<th rowspan="2">Subject</th>';
                html += '<th colspan="2">Mid T1</th>';
                html += '<th colspan="2">Term 1</th>';
                html += '<th colspan="2" style="background:#1b5e20;">T1 Avg</th>';
                html += '<th colspan="2">Mid T2</th>';
                html += '<th colspan="2">Term 2</th>';
                html += '<th colspan="2" style="background:#1b5e20;">T2 Avg</th>';
                html += '<th rowspan="2">Final</th><th rowspan="2">Pts</th><th rowspan="2">Comment</th>';
                html += '<th rowspan="2">Teacher</th><th rowspan="2">Contact</th>';
                html += '</tr><tr>';
                // 6 exam/avg groups × 2 sub-columns
                ['', '', '', '', '', ''].forEach(function() {
                    html += '<th style="font-size:9px;font-weight:normal;background:#2e7d32;">Marks</th>';
                    html += '<th style="font-size:9px;font-weight:normal;background:#2e7d32;">Grade</th>';
                });
                html += '</tr></thead><tbody>';

                tableRows.forEach(function(row) {
                    var eg = row.examGrades;
                    var avg1 = termAvg(eg, 'Mid Term 1', 'Terminal 1');
                    var avg2 = termAvg(eg, 'Mid Term 2', 'Terminal 2');

                    html += '<tr>';
                    html += '<td>' + row.subject + '</td>';
                    html += examCells(eg['Mid Term 1']);
                    html += examCells(eg['Terminal 1']);
                    html += examCells(avg1, 'final-grade-cell');
                    html += examCells(eg['Mid Term 2']);
                    html += examCells(eg['Terminal 2']);
                    html += examCells(avg2, 'final-grade-cell');

                    var comment = row.finalGrade ? gradeToComment(row.finalGrade) : '';
                    html += '<td class="final-grade-cell">' + (row.finalGrade || '<span class="no-grade">—</span>') + '</td>';
                    html += '<td>' + (row.finalPts !== '' ? row.finalPts : '<span class="no-grade">—</span>') + '</td>';
                    html += '<td style="font-size:10px;color:#555;">' + (comment || '<span class="no-grade">—</span>') + '</td>';
                    html += '<td>' + (row.teacher ? row.teacher.name : '<span class="no-grade">—</span>') + '</td>';
                    html += '<td>' + (row.teacher ? row.teacher.phone : '<span class="no-grade">—</span>') + '</td>';
                    html += '</tr>';
                });

                html += '</tbody></table>';

                // Summary section
                if (finalPoints.length > 0) {
                    var division = calculateDivision(finalPoints);
                    var best7 = finalPoints.slice().sort(function(a, b) { return a - b; }).slice(0, 7);
                    var totalPts = best7.reduce(function(s, p) { return s + p; }, 0);
                    html += '<div class="summary-box">';
                    html += '<p>Subjects Sat: <strong>' + finalPoints.length + '</strong></p>';
                    html += '<p>Total Points (Best 7): <strong>' + totalPts + '</strong></p>';
                    html += '<p class="division-label">' + division + '</p>';
                    html += '</div>';
                } else {
                    html += '<p class="no-data-msg">No exam results have been entered yet.</p>';
                }

                document.getElementById('result-content').innerHTML = html;
                loadConductForSlip(cls, stream, student);
                document.getElementById('slip-footer').style.display = 'flex';
                document.getElementById('print-btn').style.display = 'block';
            })
            .catch(function(err) {
                document.getElementById('result-content').innerHTML =
                    '<p style="color:red;">Error loading results: ' + err.message + '</p>';
            });
    });

    var CONDUCT_CATEGORIES = ['Cleanliness', 'Behaviour', 'Punctuality', 'Community Engagement', 'Respect'];
    var CONDUCT_TERMS = ['Mid Term 1', 'Terminal 1', 'Mid Term 2', 'Terminal 2'];
    var TERM_SHORT = { 'Mid Term 1': 'Mid T1', 'Terminal 1': 'Term 1', 'Mid Term 2': 'Mid T2', 'Terminal 2': 'Term 2' };

    function loadConductForSlip(cls, stream, student) {
        db.collection('conduct')
            .where('class', '==', cls)
            .where('stream', '==', stream)
            .get()
            .then(function(snapshot) {
                if (snapshot.empty) return;

                var catRatings = {};
                CONDUCT_CATEGORIES.forEach(function(c) { catRatings[c] = {}; });

                var docs = snapshot.docs.slice().sort(function(a, b) {
                    var da = a.data().date || '';
                    var db2 = b.data().date || '';
                    return da < db2 ? -1 : da > db2 ? 1 : 0;
                });

                docs.forEach(function(doc) {
                    var rec = doc.data();
                    var term = rec.term || '';
                    if (!term || !rec.conduct || !rec.conduct[student]) return;
                    var ratings = rec.conduct[student];
                    CONDUCT_CATEGORIES.forEach(function(cat) {
                        if (ratings[cat] != null) catRatings[cat][term] = ratings[cat];
                    });
                });

                var hasData = CONDUCT_CATEGORIES.some(function(cat) {
                    return Object.keys(catRatings[cat]).length > 0;
                });
                if (!hasData) return;

                var html = '<div class="conduct-section">';
                html += '<h3>Conduct & Behaviour</h3>';
                html += '<table class="conduct-table"><thead><tr><th>Category</th>';
                CONDUCT_TERMS.forEach(function(t) { html += '<th>' + TERM_SHORT[t] + '</th>'; });
                html += '</tr></thead><tbody>';

                CONDUCT_CATEGORIES.forEach(function(cat) {
                    html += '<tr><td>' + cat + '</td>';
                    CONDUCT_TERMS.forEach(function(t) {
                        var r = catRatings[cat][t];
                        html += r != null
                            ? '<td class="rating-' + r + '">' + r + '</td>'
                            : '<td><span class="no-grade">—</span></td>';
                    });
                    html += '</tr>';
                });

                html += '</tbody></table>';
                html += '<p style="font-size:10px;color:#888;">5=Excellent, 4=Good, 3=Average, 2=Poor, 1=Very Poor</p>';
                html += '</div>';

                document.getElementById('conduct-display').innerHTML = html;
            })
            .catch(function() {});
    }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
