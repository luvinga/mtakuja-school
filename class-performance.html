<!DOCTYPE html>
<html>
<head>
    <title>Class Performance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .filter-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .filter-row select {
            flex: 1;
            min-width: 150px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            margin: 0;
        }
        .filter-row button {
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
            margin: 0;
        }

        .section-title {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            margin: 20px 0 10px 0;
        }

        /* ── Subject Performance Table ── */
        .perf-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-bottom: 8px;
        }
        .perf-table th {
            background: #4CAF50;
            color: #fff;
            padding: 7px 5px;
            text-align: center;
            white-space: nowrap;
        }
        .perf-table th:first-child { text-align: left; padding-left: 8px; }
        .perf-table td {
            border-bottom: 1px solid #e0e0e0;
            padding: 6px 5px;
            text-align: center;
        }
        .perf-table td:first-child { text-align: left; padding-left: 8px; font-weight: bold; }
        .perf-table tr:nth-child(even) { background: #f1f8e9; }
        .grade-A { color: #1b5e20; font-weight: bold; }
        .grade-B { color: #2e7d32; }
        .grade-C { color: #f57c00; }
        .grade-D { color: #e65100; }
        .grade-F { color: #c62828; font-weight: bold; }
        .pass-good { color: #2e7d32; font-weight: bold; }
        .pass-warn { color: #f57c00; font-weight: bold; }
        .pass-bad  { color: #c62828; font-weight: bold; }

        /* ── Student Ranking Table ── */
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .rank-table th {
            background: #1b5e20;
            color: #fff;
            padding: 8px 6px;
            text-align: center;
            white-space: nowrap;
        }
        .rank-table th:nth-child(2) { text-align: left; padding-left: 8px; }
        .rank-table td {
            border-bottom: 1px solid #e0e0e0;
            padding: 7px 6px;
            text-align: center;
        }
        .rank-table td:nth-child(2) { text-align: left; padding-left: 8px; font-weight: bold; }
        .rank-table tr:nth-child(even) { background: #f1f8e9; }
        .rank-badge {
            display: inline-block;
            width: 26px;
            height: 26px;
            line-height: 26px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
        }
        .rank-1 { background: #FFD700; color: #333; }
        .rank-2 { background: #C0C0C0; color: #333; }
        .rank-3 { background: #CD7F32; color: #fff; }
        .rank-other { background: #e8f5e9; color: #333; }
        .div-I   { color: #1b5e20; font-weight: bold; }
        .div-II  { color: #2e7d32; }
        .div-III { color: #f57c00; }
        .div-IV  { color: #e65100; }
        .div-0   { color: #c62828; font-weight: bold; }

        /* ── Summary Stats ── */
        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .stat-card {
            flex: 1;
            min-width: 100px;
            background: #f0f7f0;
            border: 1px solid #a5d6a7;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .stat-card .stat-num {
            font-size: 22px;
            font-weight: bold;
            color: #1b5e20;
        }
        .stat-card .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        /* ── Print ── */
        .print-btn { margin-top: 16px; width: 100%; }
        @media print {
            .back-btn, .print-btn, .filter-row { display: none !important; }
            body { background: white; }
            .app-container {
                box-shadow: none;
                border-radius: 0;
                height: auto;
                width: 100%;
                max-width: 100%;
                padding: 12px;
            }
            .section-title { background: #1b5e20 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .perf-table th, .rank-table th { background: #4CAF50 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>
<h2 id="page-title">📊 Class Performance</h2>
<p id="page-subtitle" style="text-align:center;color:#555;font-size:13px;margin-top:-8px;margin-bottom:12px;"></p>

<div class="filter-row">
    <select id="term-select">
        <option value="Mid Term 1">Mid Term 1</option>
        <option value="Terminal 1">Terminal 1</option>
        <option value="Term 1 Overall">Term 1 Overall (Mid T1 + Term 1 avg)</option>
        <option value="Mid Term 2">Mid Term 2</option>
        <option value="Terminal 2">Terminal 2</option>
        <option value="Term 2 Overall">Term 2 Overall (Mid T2 + Term 2 avg)</option>
        <option value="Full Year">Full Year (All 4 Exams)</option>
    </select>
    <button onclick="renderAll()">Load</button>
</div>

<div id="main-content" style="display:none;">
    <div class="stats-row" id="stats-row"></div>
    <div class="section-title">📚 Subject Performance</div>
    <div class="table-scroll"><table class="perf-table" id="subject-table"></table></div>

    <div class="section-title">🏆 Student Ranking</div>
    <div class="table-scroll"><table class="rank-table" id="ranking-table"></table></div>

    <button class="print-btn" onclick="window.print()">🖨️ Print Report</button>
</div>

<p id="loading-msg" style="text-align:center;color:#666;">Select a term and click Load.</p>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=3"></script>
<script>
    var allStudents = [];
    var allGradeDocs = [];
    var cls, stream, subjects;

    document.addEventListener('DOMContentLoaded', function() {
        var role = checkAuth();
        if (role !== 'teacher' && role !== 'admin') { goTo('index.html'); return; }

        cls    = getSelectedClass();
        stream = getSelectedStream() || null;
        if (!cls) { goTo('teacher-dashboard.html'); return; }

        var label = stream ? cls + ' — ' + stream : cls;
        document.getElementById('page-subtitle').textContent = label;

        subjects = stream ? (streamSubjects[stream] || []) : (classSubjects[cls] || []);

        // Load students and all grades in parallel
        Promise.all([
            loadStudentsForClass(cls, stream),
            db.collection('grades').where('class', '==', cls).where('stream', '==', stream).get()
        ]).then(function(results) {
            allStudents = results[0].sort(function(a, b) { return a.name.localeCompare(b.name); });
            var snap = results[1];
            allGradeDocs = snap.docs.map(function(d) { return d.data(); });
            document.getElementById('loading-msg').textContent = 'Select a term and click Load.';
        }).catch(function(err) {
            document.getElementById('loading-msg').textContent = 'Error loading data: ' + err.message;
        });
    });

    // Returns the exam keys to aggregate for a given term selection
    function getExamKeys(termSel) {
        if (termSel === 'Term 1 Overall') return ['Mid Term 1', 'Terminal 1'];
        if (termSel === 'Term 2 Overall') return ['Mid Term 2', 'Terminal 2'];
        if (termSel === 'Full Year')      return ['Mid Term 1', 'Terminal 1', 'Mid Term 2', 'Terminal 2'];
        return [termSel]; // single exam
    }

    // For each student × subject, compute average marks across given exam keys
    function buildStudentSubjectMarks(examKeys) {
        // gradeMap[examKey][subject][studentName] = marks
        var gradeMap = {};
        allGradeDocs.forEach(function(rec) {
            var et = rec.examType;
            if (!examKeys.includes(et)) return;
            if (!rec.subject || !rec.grades) return;
            if (!gradeMap[et]) gradeMap[et] = {};
            if (!gradeMap[et][rec.subject]) gradeMap[et][rec.subject] = {};
            // last record wins (sorted by date)
            Object.keys(rec.grades).forEach(function(student) {
                gradeMap[et][rec.subject][student] = rec.grades[student];
            });
        });

        // studentMarks[studentName][subject] = average marks across examKeys (or null)
        var studentMarks = {};
        allStudents.forEach(function(s) { studentMarks[s.name] = {}; });

        subjects.forEach(function(subject) {
            allStudents.forEach(function(s) {
                var vals = [];
                examKeys.forEach(function(et) {
                    var v = gradeMap[et] && gradeMap[et][subject] && gradeMap[et][subject][s.name];
                    if (v !== undefined && v !== null && v !== '') {
                        var n = parseFloat(v);
                        if (!isNaN(n)) vals.push(n);
                    }
                });
                studentMarks[s.name][subject] = vals.length > 0
                    ? Math.round((vals.reduce(function(a, b) { return a + b; }, 0) / vals.length) * 10) / 10
                    : null;
            });
        });

        return studentMarks;
    }

    function renderAll() {
        if (allStudents.length === 0) {
            alert('Data not loaded yet. Please wait and try again.');
            return;
        }
        var termSel  = document.getElementById('term-select').value;
        var examKeys = getExamKeys(termSel);
        var studentMarks = buildStudentSubjectMarks(examKeys);

        renderStats(studentMarks, termSel);
        renderSubjectTable(studentMarks);
        renderRankingTable(studentMarks);

        document.getElementById('main-content').style.display = 'block';
        document.getElementById('loading-msg').style.display = 'none';
    }

    function renderStats(studentMarks, termSel) {
        var total = allStudents.length;
        // Count how many students have at least one grade in this term
        var sat = allStudents.filter(function(s) {
            return subjects.some(function(sub) { return studentMarks[s.name][sub] !== null; });
        }).length;

        // Overall pass rate (C and above) across all subject grades
        var allGrades = [], passCount = 0;
        allStudents.forEach(function(s) {
            subjects.forEach(function(sub) {
                var m = studentMarks[s.name][sub];
                if (m !== null) {
                    allGrades.push(m);
                    var g = marksToGrade(m);
                    if (g === 'A' || g === 'B' || g === 'C') passCount++;
                }
            });
        });
        var passRate = allGrades.length > 0 ? Math.round(passCount / allGrades.length * 100) : 0;

        // Best subject (highest avg marks)
        var subjectAvgs = subjects.map(function(sub) {
            var vals = allStudents.map(function(s) { return studentMarks[s.name][sub]; }).filter(function(v) { return v !== null; });
            return { subject: sub, avg: vals.length ? vals.reduce(function(a, b) { return a + b; }, 0) / vals.length : null };
        }).filter(function(x) { return x.avg !== null; });
        subjectAvgs.sort(function(a, b) { return b.avg - a.avg; });
        var bestSub = subjectAvgs.length ? subjectAvgs[0].subject : '—';

        document.getElementById('stats-row').innerHTML =
            statCard(total, 'Enrolled') +
            statCard(sat, 'Sat Exam') +
            statCard(total - sat, 'Absent') +
            statCard(passRate + '%', 'Pass Rate') +
            '<div class="stat-card"><div class="stat-num" style="font-size:13px;">' + bestSub + '</div><div class="stat-label">Best Subject</div></div>';
    }

    function statCard(num, label) {
        return '<div class="stat-card"><div class="stat-num">' + num + '</div><div class="stat-label">' + label + '</div></div>';
    }

    function renderSubjectTable(studentMarks) {
        var table = document.getElementById('subject-table');
        var html = '<thead><tr>';
        html += '<th>Subject</th><th>Enrolled</th><th>Sat</th><th>Absent</th>';
        html += '<th class="grade-A">A</th><th class="grade-B">B</th><th class="grade-C">C</th>';
        html += '<th class="grade-D">D</th><th class="grade-F">F</th>';
        html += '<th>Avg Marks</th><th>Pass %</th>';
        html += '</tr></thead><tbody>';

        subjects.forEach(function(subject) {
            var enrolled = allStudents.length;
            var marks = allStudents.map(function(s) { return studentMarks[s.name][subject]; });
            var sat = marks.filter(function(m) { return m !== null; });
            var absent = enrolled - sat.length;
            var counts = { A: 0, B: 0, C: 0, D: 0, F: 0 };
            sat.forEach(function(m) { counts[marksToGrade(m)]++; });
            var avgMarks = sat.length ? Math.round(sat.reduce(function(a, b) { return a + b; }, 0) / sat.length * 10) / 10 : null;
            var pass = counts.A + counts.B + counts.C;
            var passRate = sat.length ? Math.round(pass / sat.length * 100) : 0;
            var passClass = passRate >= 70 ? 'pass-good' : passRate >= 40 ? 'pass-warn' : 'pass-bad';

            html += '<tr>';
            html += '<td>' + subject + '</td>';
            html += '<td>' + enrolled + '</td>';
            html += '<td>' + sat.length + '</td>';
            html += '<td>' + (absent > 0 ? '<span style="color:#c62828;">' + absent + '</span>' : '0') + '</td>';
            html += '<td class="grade-A">' + counts.A + '</td>';
            html += '<td class="grade-B">' + counts.B + '</td>';
            html += '<td class="grade-C">' + counts.C + '</td>';
            html += '<td class="grade-D">' + counts.D + '</td>';
            html += '<td class="grade-F">' + counts.F + '</td>';
            html += '<td>' + (avgMarks !== null ? avgMarks : '<span style="color:#bbb;">—</span>') + '</td>';
            html += '<td class="' + passClass + '">' + (sat.length ? passRate + '%' : '—') + '</td>';
            html += '</tr>';
        });

        html += '</tbody>';
        table.innerHTML = html;
    }

    function renderRankingTable(studentMarks) {
        // Compute points + division per student
        var studentData = allStudents.map(function(s) {
            var pointsList = [];
            subjects.forEach(function(sub) {
                var m = studentMarks[s.name][sub];
                if (m !== null) pointsList.push(gradeToPoints(m));
            });
            var division = '—', totalPts = '—', subjectsSat = pointsList.length;
            if (pointsList.length > 0) {
                var best7 = pointsList.slice().sort(function(a, b) { return a - b; }).slice(0, 7);
                totalPts = best7.reduce(function(a, b) { return a + b; }, 0);
                division = calculateDivision(pointsList);
            }
            // Overall average marks
            var allMarks = subjects.map(function(sub) { return studentMarks[s.name][sub]; }).filter(function(v) { return v !== null; });
            var avgMarks = allMarks.length ? Math.round(allMarks.reduce(function(a, b) { return a + b; }, 0) / allMarks.length * 10) / 10 : null;

            return { name: s.name, totalPts: totalPts, division: division, subjectsSat: subjectsSat, avgMarks: avgMarks };
        });

        // Sort: students who sat first (by points asc = better), then absent last
        studentData.sort(function(a, b) {
            if (a.totalPts === '—' && b.totalPts === '—') return 0;
            if (a.totalPts === '—') return 1;
            if (b.totalPts === '—') return -1;
            return a.totalPts - b.totalPts;
        });

        var table = document.getElementById('ranking-table');
        var html = '<thead><tr>';
        html += '<th>Rank</th><th>Student Name</th><th>Subjects Sat</th><th>Avg Marks</th><th>Points (Best 7)</th><th>Division</th>';
        html += '</tr></thead><tbody>';

        var rank = 0;
        var prevPts = null;
        var rankGap = 0;

        studentData.forEach(function(s, i) {
            if (s.totalPts !== '—') {
                if (s.totalPts !== prevPts) {
                    rank += 1 + rankGap;
                    rankGap = 0;
                } else {
                    rankGap++;
                }
                prevPts = s.totalPts;
            }

            var rankDisplay, rankClass;
            if (s.totalPts === '—') {
                rankDisplay = '—';
                rankClass = 'rank-other';
            } else if (rank === 1) { rankDisplay = rank; rankClass = 'rank-1'; }
            else if (rank === 2)   { rankDisplay = rank; rankClass = 'rank-2'; }
            else if (rank === 3)   { rankDisplay = rank; rankClass = 'rank-3'; }
            else                   { rankDisplay = rank; rankClass = 'rank-other'; }

            var divClass = '';
            if (s.division === 'Division I')   divClass = 'div-I';
            else if (s.division === 'Division II')  divClass = 'div-II';
            else if (s.division === 'Division III') divClass = 'div-III';
            else if (s.division === 'Division IV')  divClass = 'div-IV';
            else if (s.division === 'Division 0')   divClass = 'div-0';

            html += '<tr>';
            html += '<td><span class="rank-badge ' + rankClass + '">' + rankDisplay + '</span></td>';
            html += '<td>' + s.name + '</td>';
            html += '<td>' + s.subjectsSat + '</td>';
            html += '<td>' + (s.avgMarks !== null ? s.avgMarks : '<span style="color:#bbb;">—</span>') + '</td>';
            html += '<td>' + (s.totalPts !== '—' ? s.totalPts : '<span style="color:#bbb;">—</span>') + '</td>';
            html += '<td class="' + divClass + '">' + s.division + '</td>';
            html += '</tr>';
        });

        html += '</tbody>';
        table.innerHTML = html;
    }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
