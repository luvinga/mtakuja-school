function log(msg, type) {
    var p = document.createElement('p');
    p.textContent = msg;
    if (type) p.className = type;
    document.getElementById('log').appendChild(p);
}

function seedData() {
    document.getElementById('seed-btn').disabled = true;
    document.getElementById('log').innerHTML = '';
    log('Starting seed...');

    var teacherPromises = teachersToSeed.map(function(t) {
        var doc = {
            name: t.name,
            phone: t.phone,
            password: t.password,
            role: t.role,
            subject: t.subject,
            forms: t.forms,
            classTeacher: t.classTeacher
        };
        return db.collection('teachers').doc(t.phone).set(doc)
            .then(function() { log('Teacher saved: ' + t.name, 'ok'); })
            .catch(function(err) { log('Error saving teacher ' + t.name + ': ' + err.message, 'err'); });
    });

    Promise.all(teacherPromises).then(function() {
        log('--- All teachers done. Starting students... ---');

        var studentPromises = studentsToSeed.map(function(s) {
            var doc = {
                name: s.name,
                form: s.form,
                stream: s.stream,
                parentPhone: s.parentPhone,
                parentPassword: s.parentPassword
            };
            return db.collection('students').doc(s.parentPhone).set(doc)
                .then(function() { log('Student saved: ' + s.name, 'ok'); })
                .catch(function(err) { log('Error saving student ' + s.name + ': ' + err.message, 'err'); });
        });

        return Promise.all(studentPromises);
    }).then(function() {
        log('--- Done! Firestore has been seeded. ---', 'ok');
        document.getElementById('seed-btn').disabled = false;
    }).catch(function(err) {
        log('Unexpected error: ' + err.message, 'err');
        document.getElementById('seed-btn').disabled = false;
    });
}
