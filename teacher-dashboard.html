<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="app-container">

<h2 id="dashboard-title">👨‍🏫 Dashboard</h2>
<p id="dashboard-sub" style="text-align:center; color:#666;">Loading...</p>

<div id="form-buttons"></div>

<button onclick="logout()" style="background:#f44336; margin-top:20px;">Logout</button>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=8"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const role = checkAuth();
        if (role !== 'teacher' && role !== 'admin') { goTo('index.html'); return; }

        const phone = localStorage.getItem('teacherPhone');
        if (!phone) { goTo('index.html'); return; }

        // Try cached data first for instant display, then confirm from Firestore
        let cachedTeacher = null;
        try { cachedTeacher = JSON.parse(localStorage.getItem('teacherData')); } catch(e) {}

        if (cachedTeacher) {
            renderDashboard(cachedTeacher);
        }

        // Always refresh from Firestore to stay up-to-date
        loadTeacherFromFirestore(phone)
            .then(function(teacher) {
                if (!teacher) { goTo('index.html'); return; }
                localStorage.setItem('teacherData', JSON.stringify(teacher));
                renderDashboard(teacher);
            })
            .catch(function(err) {
                if (!cachedTeacher) {
                    document.getElementById('dashboard-sub').textContent = 'Error loading data: ' + err.message;
                }
            });
    });

    function renderDashboard(teacher) {
        document.getElementById('dashboard-title').textContent = '👨‍🏫 Welcome, ' + teacher.name;

        if (teacher.role === 'admin') {
            document.getElementById('dashboard-sub').textContent = 'Admin — full access';
        } else if (teacher.subject) {
            document.getElementById('dashboard-sub').textContent = 'Subject: ' + teacher.subject;
        } else {
            document.getElementById('dashboard-sub').textContent = '';
        }

        const forms = getTeacherForms(teacher);
        const container = document.getElementById('form-buttons');
        container.innerHTML = '';

        forms.forEach(function(form) {
            const btn = document.createElement('button');
            btn.textContent = '📚 ' + form;
            btn.onclick = function() { selectForm(form); };
            container.appendChild(btn);
        });

        // Show admin panel link for admin users
        if (teacher.role === 'admin') {
            const dashBtn = document.createElement('button');
            dashBtn.textContent = '📊 Dashboard Summary';
            dashBtn.style.background = 'linear-gradient(135deg, #1565c0, #0d47a1)';
            dashBtn.onclick = function() { goTo('admin-dashboard.html'); };
            container.appendChild(dashBtn);

            const adminBtn = document.createElement('button');
            adminBtn.textContent = '⚙️ Admin Panel';
            adminBtn.style.background = '#9C27B0';
            adminBtn.onclick = function() { goTo('admin.html'); };
            container.appendChild(adminBtn);
        }
    }

    function selectForm(form) {
        localStorage.setItem('selectedClass', form);
        localStorage.removeItem('selectedStream');
        goTo('class-dashboard.html');
    }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
