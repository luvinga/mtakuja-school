<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .welcome-banner {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .welcome-banner h3 {
            margin: 0 0 6px;
            color: #2e7d32;
            font-size: 17px;
        }
        .welcome-banner p {
            margin: 0;
            color: #555;
            font-size: 14px;
        }
        #user-name-display {
            font-weight: bold;
            color: #1b5e20;
        }
        #change-password-form input[type="password"] {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin: 6px 0 0;
            padding: 10px;
            font-size: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        #change-password-form label {
            margin-top: 14px;
            font-weight: bold;
            color: #444;
            display: block;
        }
        #change-password-form button[type="submit"] {
            margin-top: 20px;
            background: #4CAF50;
            width: 100%;
        }
        #cp-error {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        #cp-status {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container">

    <div class="welcome-banner">
        <h3 data-i18n="set_password_title">Welcome! Please set your new password</h3>
        <p>Logged in as <span id="user-name-display">...</span></p>
    </div>

    <form id="change-password-form">
        <label for="new-phone" data-i18n="new_phone">Phone Number</label>
        <input type="tel" id="new-phone" placeholder="Enter your phone number" required>

        <label for="new-password" data-i18n="new_password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password (min 6 characters)" required>

        <label for="confirm-password" data-i18n="confirm_password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter new password" required>

        <button type="submit" id="cp-submit-btn" data-i18n="save_continue">Save & Continue</button>
    </form>

    <div id="cp-error"></div>
    <div id="cp-status"></div>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=8"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Auth guard: must be logged in and have a forced password change pending
        const role = localStorage.getItem('role');
        const forceChange = localStorage.getItem('forcePasswordChange');
        if (!role) {
            goTo('index.html');
            return;
        }
        if (!forceChange) {
            // Already changed or not forced — send to correct dashboard
            if (role === 'parent') {
                goTo('parent-dashboard.html');
            } else {
                goTo('teacher-dashboard.html');
            }
            return;
        }

        // Show the user's name
        const collection = localStorage.getItem('changePasswordCollection');
        const phone = localStorage.getItem('changePasswordPhone');

        if (collection === 'teachers') {
            var cachedTeacher = null;
            try { cachedTeacher = JSON.parse(localStorage.getItem('teacherData')); } catch(e) {}
            if (cachedTeacher && cachedTeacher.name) {
                document.getElementById('user-name-display').textContent = cachedTeacher.name;
            } else if (phone) {
                db.collection('teachers').where('phone', '==', phone).get()
                    .then(function(snap) {
                        if (!snap.empty) {
                            document.getElementById('user-name-display').textContent = snap.docs[0].data().name || phone;
                        }
                    });
            }
        } else if (collection === 'students') {
            var studentName = localStorage.getItem('student');
            if (studentName) {
                document.getElementById('user-name-display').textContent = 'Parent of ' + studentName;
            } else if (phone) {
                db.collection('students').where('parentPhone', '==', phone).get()
                    .then(function(snap) {
                        if (!snap.empty) {
                            var s = snap.docs[0].data();
                            document.getElementById('user-name-display').textContent = 'Parent of ' + (s.name || phone);
                        }
                    });
            }
        }
    });

    document.getElementById('change-password-form').addEventListener('submit', function(e) {
        e.preventDefault();

        var newPhone    = document.getElementById('new-phone').value.trim();
        var newPass     = document.getElementById('new-password').value;
        var confirmPass = document.getElementById('confirm-password').value;
        var errorEl     = document.getElementById('cp-error');
        var statusEl    = document.getElementById('cp-status');
        var submitBtn   = document.getElementById('cp-submit-btn');

        errorEl.style.display  = 'none';
        statusEl.style.display = 'none';

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            submitBtn.disabled = false;
        }

        if (!newPhone) {
            showError('Please enter your phone number.');
            return;
        }
        if (newPass.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }
        if (newPass !== confirmPass) {
            showError('Passwords do not match. Please try again.');
            return;
        }

        var collection = localStorage.getItem('changePasswordCollection');
        var phone      = localStorage.getItem('changePasswordPhone');
        var role       = localStorage.getItem('role');

        if (!collection || !phone) {
            showError('Session error. Please log in again.');
            return;
        }

        submitBtn.disabled = true;
        statusEl.textContent = 'Saving your new password...';
        statusEl.style.display = 'block';

        if (collection === 'teachers') {
            // Query by phone field (same way login works) — avoids doc ID mismatch
            db.collection('teachers').where('phone', '==', phone).get()
                .then(function(snap) {
                    if (snap.empty) throw new Error('Teacher record not found. Please log in again.');
                    return snap.docs[0].ref.update({
                        password: newPass,
                        phone: newPhone,
                        passwordChanged: true
                    });
                })
                .then(function() {
                    try {
                        var td = JSON.parse(localStorage.getItem('teacherData'));
                        if (td) { td.password = newPass; td.phone = newPhone; td.passwordChanged = true; localStorage.setItem('teacherData', JSON.stringify(td)); }
                    } catch(e) {}
                    localStorage.setItem('teacherPhone', newPhone);
                    localStorage.removeItem('forcePasswordChange');
                    localStorage.removeItem('changePasswordPhone');
                    localStorage.removeItem('changePasswordCollection');
                    goTo('teacher-dashboard.html');
                })
                .catch(function(err) {
                    showError('Failed to save: ' + err.message);
                });

        } else if (collection === 'students') {
            db.collection('students').where('parentPhone', '==', phone).get()
                .then(function(snap) {
                    if (snap.empty) throw new Error('Student record not found. Please log in again.');
                    return snap.docs[0].ref.update({
                        parentPassword: newPass,
                        parentPhone: newPhone,
                        passwordChanged: true
                    });
                })
                .then(function() {
                    localStorage.setItem('studentPhone', newPhone);
                    localStorage.removeItem('forcePasswordChange');
                    localStorage.removeItem('changePasswordPhone');
                    localStorage.removeItem('changePasswordCollection');
                    goTo('parent-dashboard.html');
                })
                .catch(function(err) {
                    showError('Failed to save: ' + err.message);
                });
        }
    });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
