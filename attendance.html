<!DOCTYPE html>
<html>
<head>
    <title>Take Attendance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<h2 id="attendance-title" data-i18n="attendance_title">Take Attendance</h2>

<p id="loading-msg" style="text-align:center; color:#666;" data-i18n="loading_students">Loading students...</p>
<div id="attendance-list"></div>

<br>
<button id="save-btn" onclick="saveAttendance()" data-i18n="save_attendance" style="display:none;">Save &amp; Submit</button>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="translations.js"></script>
<script src="script.js?v=9"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cls = getSelectedClass();
        if (!cls) { goTo('teacher-dashboard.html'); return; }
        const stream = getSelectedStream();
        const label = stream ? cls + ' (' + stream + ')' : cls;
        document.getElementById('attendance-title').textContent = 'Attendance — ' + label;

        loadStudentsForClass(cls, stream || null)
            .then(function(students) {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('save-btn').style.display = 'block';

                if (students.length === 0) {
                    document.getElementById('loading-msg').textContent = 'No students found for this class.';
                    document.getElementById('loading-msg').style.display = 'block';
                    return;
                }

                // Sort students alphabetically by name
                students.sort(function(a, b) { return a.name.localeCompare(b.name); });

                const list = document.getElementById('attendance-list');
                students.forEach(function(student) {
                    const div = document.createElement('div');
                    div.className = 'student-row';

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'student-name';
                    nameSpan.textContent = student.name;

                    const presentBtn = document.createElement('button');
                    presentBtn.textContent = '✅ Present';
                    presentBtn.onclick = function() { mark(student.name, 'Present'); };

                    const absentBtn = document.createElement('button');
                    absentBtn.textContent = '❌ Absent';
                    absentBtn.onclick = function() { mark(student.name, 'Absent'); };

                    div.appendChild(nameSpan);
                    div.appendChild(presentBtn);
                    div.appendChild(absentBtn);
                    list.appendChild(div);
                });
            })
            .catch(function(err) {
                document.getElementById('loading-msg').textContent = 'Error loading students: ' + err.message;
            });
    });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
