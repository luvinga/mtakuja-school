<!DOCTYPE html>
<html>
<head>
    <title>Child Grades</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .grades-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 12px;
        }
        .grades-table th {
            background: #4CAF50;
            color: white;
            padding: 6px 4px;
            text-align: center;
        }
        .grades-table th:first-child {
            text-align: left;
            padding-left: 8px;
        }
        .grades-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        .grades-table td:first-child {
            text-align: left;
            padding-left: 8px;
            font-size: 12px;
        }
        .grades-table tr:nth-child(even) { background: #f9f9f9; }
        .no-grade { color: #aaa; font-style: italic; }
        .final-grade { font-weight: bold; color: #333; }
        .conduct-section {
            margin-top: 20px;
        }
        .conduct-section h3 {
            font-size: 14px;
            color: #2e7d32;
            margin-bottom: 6px;
        }
        .conduct-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-bottom: 10px;
        }
        .conduct-table th {
            background: #66BB6A;
            color: white;
            padding: 5px 3px;
            text-align: center;
        }
        .conduct-table th:first-child { text-align: left; padding-left: 6px; }
        .conduct-table td {
            padding: 5px 3px;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
        }
        .conduct-table td:first-child { text-align: left; padding-left: 6px; }
        .conduct-table tr:nth-child(even) { background: #f9f9f9; }
        .rating-5 { color: #2e7d32; font-weight: bold; }
        .rating-4 { color: #388e3c; }
        .rating-3 { color: #f57c00; }
        .rating-2 { color: #d32f2f; }
        .rating-1 { color: #b71c1c; font-weight: bold; }
        .summary-box {
            margin-top: 14px;
            background: #f0f7f0;
            border: 1px solid #4CAF50;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
        }
        .summary-box p {
            margin: 4px 0;
        }
        .division-label {
            font-size: 16px;
            font-weight: bold;
            color: #2e7d32;
        }
        .print-btn {
            margin-top: 12px;
        }
        @media print {
            .back-btn, .print-btn { display: none !important; }
            body { background: white; }
            .app-container {
                box-shadow: none;
                border-radius: 0;
                height: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-container">

<button class="back-btn" onclick="goBack()">← Back</button>

<h2 id="grades-title">Grades Report</h2>

<div id="grades-display"><p>Loading...</p></div>

<div id="conduct-display"></div>

<button class="print-btn" onclick="window.print()" style="display:none;" id="print-btn">Print Report</button>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js?v=2"></script>
<script src="translations.js"></script>
<script src="script.js?v=2"></script>
<script>
    const EXAM_TYPES = ['Mid Term 1', 'Terminal 1', 'Mid Term 2', 'Terminal 2'];
    const EXAM_SHORT = { 'Mid Term 1': 'Mid T1', 'Terminal 1': 'Term 1', 'Mid Term 2': 'Mid T2', 'Terminal 2': 'Term 2' };

    document.addEventListener('DOMContentLoaded', function() {
        if (checkAuth() !== 'parent') { goTo('index.html'); return; }

        const student = localStorage.getItem('student');
        const cls     = localStorage.getItem('studentClass');
        const stream  = localStorage.getItem('studentStream') || null;
        const display = document.getElementById('grades-display');

        const label = stream ? cls + ' — ' + stream : cls;
        document.getElementById('grades-title').textContent = 'Grades — ' + student;

        // Get subjects for this student's class/stream
        let subjects = [];
        if (stream) {
            subjects = streamSubjects[stream] || [];
        } else {
            subjects = classSubjects[cls] || [];
        }

        if (subjects.length === 0) {
            display.innerHTML = '<p>No subjects found for this class.</p>';
            return;
        }

        db.collection('grades')
            .where('class', '==', cls)
            .where('stream', '==', stream)
            .get()
            .then(function(snapshot) {
                // Build: subjectGrades[subject][examType] = latest grade for this student
                const subjectGrades = {};
                subjects.forEach(function(s) {
                    subjectGrades[s] = {};
                });

                // Sort ascending by date client-side (avoids composite index requirement)
                var docs = snapshot.docs.slice().sort(function(a, b) {
                    var da = a.data().date || '';
                    var db2 = b.data().date || '';
                    return da < db2 ? -1 : da > db2 ? 1 : 0;
                });

                docs.forEach(function(doc) {
                    const record = doc.data();
                    if (!record.subject || !record.grades || record.grades[student] === undefined) return;
                    const examType = record.examType || '';
                    if (!examType) return;
                    const grade = record.grades[student];
                    if (!subjectGrades[record.subject]) subjectGrades[record.subject] = {};
                    // Last record wins (ordered asc)
                    subjectGrades[record.subject][examType] = grade;
                });

                // Build table
                let html = '<p style="color:#666; font-size:12px;">Class: ' + label + '</p>';
                html += '<table class="grades-table"><thead><tr>';
                html += '<th>Subject</th>';
                EXAM_TYPES.forEach(function(et) {
                    html += '<th>' + EXAM_SHORT[et] + '</th>';
                });
                html += '<th>Final</th><th>Pts</th></tr></thead><tbody>';

                const finalPoints = [];

                subjects.forEach(function(subject) {
                    const examGrades = subjectGrades[subject] || {};
                    const pointsList = [];
                    EXAM_TYPES.forEach(function(et) {
                        const g = examGrades[et];
                        if (g) pointsList.push(gradeToPoints(g));
                    });

                    let finalGrade = '';
                    let finalPts = '';
                    if (pointsList.length > 0) {
                        const avg = pointsList.reduce(function(s, p) { return s + p; }, 0) / pointsList.length;
                        finalGrade = pointsToGrade(avg);
                        finalPts = gradeToPoints(finalGrade);
                        finalPoints.push(finalPts);
                    }

                    html += '<tr>';
                    html += '<td>' + subject + '</td>';
                    EXAM_TYPES.forEach(function(et) {
                        const g = examGrades[et];
                        html += '<td>' + (g ? '<strong>' + g + '</strong>' : '<span class="no-grade">—</span>') + '</td>';
                    });
                    html += '<td class="final-grade">' + (finalGrade || '<span class="no-grade">—</span>') + '</td>';
                    html += '<td>' + (finalPts !== '' ? finalPts : '<span class="no-grade">—</span>') + '</td>';
                    html += '</tr>';
                });

                html += '</tbody></table>';

                // Summary
                if (finalPoints.length > 0) {
                    const division = calculateDivision(finalPoints);
                    const best7pts = finalPoints.slice().sort(function(a, b) { return a - b; }).slice(0, 7);
                    const totalPts = best7pts.reduce(function(s, p) { return s + p; }, 0);
                    html += '<div class="summary-box">';
                    html += '<p>Subjects Sat: <strong>' + finalPoints.length + '</strong></p>';
                    html += '<p>Total Points (Best 7): <strong>' + totalPts + '</strong></p>';
                    html += '<p class="division-label">' + division + '</p>';
                    html += '</div>';
                }

                display.innerHTML = html;

                // Load conduct ratings
                loadConductForStudent(cls, stream, student);

                document.getElementById('print-btn').style.display = 'block';
            })
            .catch(function(err) {
                display.innerHTML = '<p style="color:red;">Error loading grades: ' + err.message + '</p>';
            });
    });

    var CONDUCT_CATEGORIES = ['Cleanliness', 'Behaviour', 'Punctuality', 'Community Engagement', 'Respect'];
    var EXAM_SHORT_CONDUCT = { 'Mid Term 1': 'Mid T1', 'Terminal 1': 'Term 1', 'Mid Term 2': 'Mid T2', 'Terminal 2': 'Term 2' };
    var CONDUCT_TERMS = ['Mid Term 1', 'Terminal 1', 'Mid Term 2', 'Terminal 2'];

    function ratingClass(r) {
        if (!r) return '';
        return 'rating-' + r;
    }

    function loadConductForStudent(cls, stream, student) {
        db.collection('conduct')
            .where('class', '==', cls)
            .where('stream', '==', stream)
            .get()
            .then(function(snapshot) {
                if (snapshot.empty) return;

                // Build: catRatings[category][term] = latest rating
                var catRatings = {};
                CONDUCT_CATEGORIES.forEach(function(c) { catRatings[c] = {}; });

                // Sort by date asc, last record wins per term
                var docs = snapshot.docs.slice().sort(function(a, b) {
                    var da = a.data().date || '';
                    var db2 = b.data().date || '';
                    return da < db2 ? -1 : da > db2 ? 1 : 0;
                });

                docs.forEach(function(doc) {
                    var rec = doc.data();
                    var term = rec.term || '';
                    if (!term || !rec.conduct || !rec.conduct[student]) return;
                    var ratings = rec.conduct[student];
                    CONDUCT_CATEGORIES.forEach(function(cat) {
                        if (ratings[cat] != null) {
                            catRatings[cat][term] = ratings[cat];
                        }
                    });
                });

                // Check if any data exists
                var hasData = CONDUCT_CATEGORIES.some(function(cat) {
                    return Object.keys(catRatings[cat]).length > 0;
                });
                if (!hasData) return;

                var html = '<div class="conduct-section">';
                html += '<h3>Conduct & Behaviour</h3>';
                html += '<table class="conduct-table"><thead><tr>';
                html += '<th>Category</th>';
                CONDUCT_TERMS.forEach(function(t) {
                    html += '<th>' + EXAM_SHORT_CONDUCT[t] + '</th>';
                });
                html += '</tr></thead><tbody>';

                CONDUCT_CATEGORIES.forEach(function(cat) {
                    html += '<tr><td>' + cat + '</td>';
                    CONDUCT_TERMS.forEach(function(t) {
                        var r = catRatings[cat][t];
                        if (r != null) {
                            html += '<td class="' + ratingClass(r) + '">' + r + '</td>';
                        } else {
                            html += '<td><span class="no-grade">—</span></td>';
                        }
                    });
                    html += '</tr>';
                });

                html += '</tbody></table>';
                html += '<p style="font-size:11px;color:#888;">Rating: 5=Excellent, 4=Good, 3=Average, 2=Poor, 1=Very Poor</p>';
                html += '</div>';

                document.getElementById('conduct-display').innerHTML = html;
            })
            .catch(function() {}); // Silently ignore if conduct collection not yet created
    }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
