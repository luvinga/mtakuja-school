<!DOCTYPE html>
<html>
<head>
    <title>Mtakuja Beach Sec School</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="app-container">

<img src="mtakuja.png" alt="Mtakuja Beach Sec School Logo" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 20px;">

<h1>Mtakuja Beach Sec School</h1>
<h2>Login Screen</h2>

<form id="login-form">
    <label for="role">Login as:</label>
    <select id="role" required>
        <option value="">Select Role</option>
        <option value="teacher">Teacher</option>
        <option value="parent">Parent</option>
    </select>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" placeholder="Enter Phone Number" required>

    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter Password" required>

    <button type="submit" id="login-btn">Login</button>
</form>

<div id="error-message" style="color: red; display: none;"></div>
<div id="status-message" style="color: #666; display: none;"></div>

</div>
<script src="firebase-app-compat.js"></script>
<script src="firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="script.js?v=2"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const role     = document.getElementById('role').value;
        const phone    = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg  = document.getElementById('error-message');
        const statusMsg = document.getElementById('status-message');
        const loginBtn  = document.getElementById('login-btn');

        errorMsg.style.display  = 'none';
        statusMsg.style.display = 'none';
        loginBtn.disabled = true;
        statusMsg.textContent = 'Logging in...';
        statusMsg.style.display = 'block';

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            statusMsg.style.display = 'none';
            loginBtn.disabled = false;
        }

        if (role === 'teacher') {
            db.collection('teachers').where('phone', '==', phone).get()
                .then(function(snapshot) {
                    if (snapshot.empty) { showError('Invalid credentials. Please try again.'); return; }
                    const teacher = snapshot.docs[0].data();
                    if (teacher.password !== password) { showError('Invalid credentials. Please try again.'); return; }
                    localStorage.setItem('role', teacher.role === 'admin' ? 'admin' : 'teacher');
                    localStorage.setItem('teacherPhone', phone);
                    localStorage.setItem('teacherData', JSON.stringify(teacher));
                    goTo('teacher-dashboard.html');
                })
                .catch(function(err) { showError('Error: ' + err.message); });

        } else if (role === 'parent') {
            db.collection('students').where('parentPhone', '==', phone).get()
                .then(function(snapshot) {
                    if (snapshot.empty) { showError('Invalid credentials. Please try again.'); return; }
                    const student = snapshot.docs[0].data();
                    if (student.parentPassword !== password) { showError('Invalid credentials. Please try again.'); return; }
                    localStorage.setItem('role', 'parent');
                    localStorage.setItem('student', student.name);
                    localStorage.setItem('studentClass', student.form);
                    localStorage.setItem('studentStream', student.stream || '');
                    goTo('parent-dashboard.html');
                })
                .catch(function(err) { showError('Error: ' + err.message); });

        } else {
            showError('Please select a role.');
        }
    });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}</script>
</body>
</html>
